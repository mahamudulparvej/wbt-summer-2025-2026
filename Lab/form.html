<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8">
  <meta name="Donor Information" content="width=device-width, initial-scale=1.0">
  <title>Donor Information</title>
</head>
 
<body>
 
 
 
  <hr>
 
  <h1>Donor Information</h1>
 
 
  <form action="#" method="post">
 
    <fieldset>
     
 
      <table>
        <tr>
          <td><label for="firstName">First Name*</label></td>
          <td><input type="text" id="firstName" name="firstName" required></td>
        </tr>
        <tr>
          <td><label for="lastName">Last Name*</label></td>
          <td><input type="text" id="lastName" name="lastName" required></td>
        </tr>
        <tr>
          <td><label for="company">Company</label></td>
          <td><input type="text" id="company" name="company" required></td>
        </tr>
        <tr>
          <td><label for="address1">Address 1*</label></td>
          <td><input type="text" id="address1" name="address1" required></td>
        </tr>
        <tr>
          <td><label for="address2">Address 2</label></td>
          <td><input type="text" id="address2" name="address2" required></td>
        </tr>
          <tr>
          <td><label for="city">City *</label></td>
          <td><input type="text" id="address2" name="address2" required></td>
        </tr>
      <tr>
             <td><label for="state">State *</label></td>
              <td>
                   <select id="state" name="state" required>
                            <option value="">Select a State</option>
                            <option>California</option>
                            <option>Texas</option>
                            <option>New York</option>
                   </select>
               </td>
        </tr>
        <tr>
                    <td><label for="zip">Zip Code *</label></td>
                    <td><input type="text" id="zip" name="zip" required></td>
         </tr>
 
        <tr>
                    <td><label for="country">Country *</label></td>
                    <td>
                        <select id="country" name="country" required>
                            <option value="">Select a Country</option>
                            <option>United States</option>
                            <option>Canada</option>
                            <option>Bangladesh</option>
                        </select>
                    </td>
                </tr>
           <tr>
                    <td><label for="phone">Phone</label></td>
                    <td><input type="text" id="phone" name="phone"></td>
           </tr>
           <tr>
    <td><label for="fax">Fax</label></td>
    <td><input type="text" id="fax" name="fax"></td>
           </tr>
        <tr>
          <td><label for="email">Email:</label></td>
          <td><input type="email" id="email" name="email" required></td>
        </tr>
       
<tr>
    <td><label>Donation Amount *</label></td>
    <td>
        <input type="radio" name="donation" value="none"> None
        <input type="radio" name="donation" value="50"> $50
        <input type="radio" name="donation" value="75"> $75
        <input type="radio" name="donation" value="100"> $100
        <input type="radio" name="donation" value="250"> $250
        <input type="radio" name="donation" value="other"> Other
    </td>
</tr>
<tr>
    <td><label for="otherAmount">Other Amount $</label></td>
    <td>
        <input type="number" id="otherAmount" name="otherAmount" min="1">
    </td>
</tr>
<tr>
    <td><label for="recurring">Recurring Donation</label></td>
    <td>
        <input type="checkbox" id="recurring" name="recurring">
        I am interested in giving on a regular basis.
    </td>
</tr>
       <tr>
    <td></td>
    <td>
        Monthly Credit Card $
        <input type="number" name="monthlyAmount" style="width:80px;">
        For
        <input type="number" name="months" style="width:60px;">
        Months
    </td>
</tr>
      </table>
    </fieldset>
  </form>
 
  <hr>
 
 
 
</body>
 
</html>
