<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="Create Account Form" content="width=device-width, initial-scale=1.0">
     <title>Create Your Account</title>
</head>

<body>
    <div class="field">
        <h1>Create Your Account</h1>
        <p>Join us in a couple of steps.</p>
    </div>

    <div class="field">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Parvej">
    </div>

    <div class="field">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="28">
    </div>

     <div class="dob">
        <label>Date of Birth</label>
        <input type="text" placeholder="25 / 06 / 2026">
    </div>

    <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="parvej@example.com">
    </div>

    <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="*****">
    </div>

     <div class="field">
            <label>Preferred contact</label>
            <div class="radio-group">
            <label>
                    <input type="radio" name="contact" checked>
                    Email
            </label>

            <label>
                    <input type="radio" name="contact">
                    Phone
            </label>

            <label>
                    <input type="radio" name="contact">
                    SMS
            </label>
            </div>
        </div>


        <div class="field-buttons">
            <button type="submit"class="btn-primary">Create Workspace</button>
            <button type="reset" class="btn-secondary">Reset</button>
        </div>

    </div>


</body>
